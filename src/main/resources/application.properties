# =============================================================================
# EmpireForge — Основная конфигурация
# =============================================================================
# Чувствительные параметры задаются через переменные окружения:
#   TELEGRAM_BOT_USERNAME, TELEGRAM_BOT_TOKEN
# =============================================================================

# ---------- База данных (H2 in-memory, режим разработки) ----------
spring.datasource.url=jdbc:h2:mem:empireforge;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# ---------- Telegram Bot (через переменные окружения) ----------
telegram.bot.username=${TELEGRAM_BOT_USERNAME:empireforge_bot}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.webhook-path=${TELEGRAM_BOT_WEBHOOK_PATH:}
telegram.bot.enable-long-polling=${TELEGRAM_BOT_LONG_POLLING:true}

# ---------- Webhook Secret Token (для верификации запросов от Telegram) ----------
telegram.bot.secret-token=${TELEGRAM_BOT_SECRET_TOKEN:}
